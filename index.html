<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulatore d'Esame</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #0056b3;
            --primary-hover: #004085;
            --success: #28a745;
            --success-bg: #d4edda;
            --danger: #dc3545;
            --danger-bg: #f8d7da;
            --neutral-bg: #f8f9fa;
            --text-main: #333;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #e9ecef; color: var(--text-main); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .quiz-card { width: 100%; max-width: 650px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); margin-top: 10px; }
        .header { text-align: center; border-bottom: 2px solid #dee2e6; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { font-size: 24px; color: var(--primary); margin: 0 0 10px 0; }
        .stats-bar { display: flex; justify-content: space-between; font-size: 14px; color: #6c757d; font-weight: 600; }
        .question-box { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 20px; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-item { background: var(--neutral-bg); border: 2px solid #ced4da; padding: 14px 18px; border-radius: 10px; cursor: pointer; font-size: 16px; transition: all 0.2s ease; }
        .option-item:hover { border-color: var(--primary); background-color: #f1f7fe; }
        .option-item.correct { background-color: var(--success-bg) !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        .option-item.wrong { background-color: var(--danger-bg) !important; border-color: var(--danger) !important; color: #721c24; }
        .explanation { margin-top: 20px; padding: 15px; background-color: #e2f0fe; border-left: 5px solid var(--primary); border-radius: 6px; font-size: 15px; line-height: 1.5; display: none; }
        .action-btn { display: block; width: 100%; background: var(--primary); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 25px; transition: background 0.2s; }
        .results-screen { text-align: center; padding: 20px 0; }
        .score-badge { font-size: 48px; font-weight: 800; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="quiz-card" id="main-content">
    <div id="quiz-game">
        <div class="header">
            <h1>Simulazione Diritto Commerciale</h1>
            <div class="stats-bar">
                <span id="progress-text">Caricamento...</span>
                <span id="score-text">Punti: 0.0</span>
            </div>
        </div>
        <div class="question-box" id="question-text">Attendere connessione al server...</div>
        <div class="options-list" id="options-container"></div>
        <div class="explanation" id="explanation-box"></div>
        <button class="action-btn" id="next-btn" style="display: none;" onclick="handleNext()">Prossima Domanda</button>
    </div>

    <div id="quiz-results" style="display: none;" class="results-screen">
        <h1>Esame Completato! 🏖️</h1>
        <div class="score-badge" id="final-score">0.0</div>
        <p id="result-comment"></p>
        <button class="action-btn" onclick="location.reload()">Ricomincia</button>
    </div>
</div>

<script>
let activeQuestions = [];
let currentIndex = 0;
let currentScore = 0.0;
let isAnswered = false;

async function initQuiz() {
    try {
        const response = await fetch('https://quiz-backend-585h.onrender.com/get-questions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ initData: window.Telegram.WebApp.initData })
        });

        if (!response.ok) throw new Error("Server non raggiungibile");

        const data = await response.json();
        activeQuestions = data.questions; 
        currentIndex = 0;
        currentScore = 0.0;
        loadQuestion();
    } catch (error) {
        document.getElementById("question-text").innerText = "Errore: impossibile caricare il server. Riprova tra poco (il server potrebbe essere in fase di avvio).";
        console.error(error);
    }
}

function loadQuestion() {
    isAnswered = false;
    const currentQ = activeQuestions[currentIndex];
    document.getElementById("progress-text").innerText = `Domanda ${currentIndex + 1} di ${activeQuestions.length}`;
    document.getElementById("score-text").innerText = `Punti: ${currentScore.toFixed(2)}`;
    document.getElementById("question-text").innerText = currentQ.q;
    
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    document.getElementById("explanation-box").style.display = "none";
    document.getElementById("next-btn").style.display = "none";

    currentQ.options.forEach((opt) => {
        const div = document.createElement("div");
        div.className = "option-item";
        div.innerText = opt.text;
        div.onclick = () => selectOption(div, opt);
        container.appendChild(div);
    });
}

function selectOption(element, option) {
    if (isAnswered) return;
    isAnswered = true;
    if (option.correct) {
        element.classList.add("correct");
        currentScore += 0.50;
    } else {
        element.classList.add("wrong");
        const correctIdx = activeQuestions[currentIndex].options.findIndex(o => o.correct);
        document.querySelectorAll(".option-item")[correctIdx].classList.add("correct");
    }
    document.getElementById("score-text").innerText = `Punti: ${currentScore.toFixed(2)}`;
    const expBox = document.getElementById("explanation-box");
    expBox.innerHTML = `<strong>Spiegazione:</strong> ${option.info}`;
    expBox.style.display = "block";
    document.getElementById("next-btn").style.display = "block";
}

function handleNext() {
    currentIndex++;
    if (currentIndex < activeQuestions.length) loadQuestion();
    else showResults();
}

function showResults() {
    document.getElementById("quiz-game").style.display = "none";
    document.getElementById("quiz-results").style.display = "block";
    document.getElementById("final-score").innerText = `${currentScore.toFixed(2)} / ${(activeQuestions.length * 0.5).toFixed(1)}`;
}

document.addEventListener("DOMContentLoaded", function() {
    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
        window.Telegram.WebApp.ready();
        initQuiz();
    } else {
        document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>Accesso non consentito. Usa Telegram.</h1>";
    }
});
</script>
</body>
</html>
