<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulazione Esame</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quiz-container" style="display: none;">
        <div id="app">
            <div id="start-screen">
                <h1>Simulazione DIRITTO COMMERCIALE</h1>
                <p>Simulazione: 30 domande casuali.</p>
                <button onclick="startSimulation()">Avvia Simulazione</button>
            </div>
            <div id="quiz-screen" style="display:none;">
                <div id="progress">Domanda 1/30</div>
                <h3 id="question">Caricamento...</h3>
                <div id="options-container"></div>
                <div id="feedback-container" style="display:none;">
                    <p id="result-text"></p>
                    <div id="info-box"></div>
                    <button onclick="nextQuestion()">Prossima domanda</button>
                </div>
            </div>
            <div id="result-screen" style="display:none;">
                <h2>Simulazione Terminata</h2>
                <p id="final-score"></p>
                <button onclick="location.reload()">Riprova</button>
            </div>
        </div>
    </div>

    <div id="payment-container" style="display: none; text-align: center; margin-top: 50px;">
        <h1>Accesso Riservato</h1>
        <p>Per continuare, sblocca il quiz con le Telegram Stars.</p>
        <button onclick="pagaConStars()" style="padding: 15px; font-size: 20px;">Paga Ora</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
